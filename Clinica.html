<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaira Estética Avançada</title>
    
    <!-- React & ReactDOM (Via CDN para não precisar instalar) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel para traduzir o código React no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (Estilização sem baixar nada) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'zaira-brown': '#594A31',
                        'zaira-beige': '#F9F5EF',
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'fade-in-up': 'fadeInUp 0.8s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Fonte Montserrat -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Montserrat', sans-serif; }
        
        .glass-effect {
            background: rgba(249, 245, 239, 0.85);
            backdrop-filter: blur(10px);
        }
        .gradient-text {
            background: linear-gradient(90deg, #594A31 0%, #8A7350 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #594A31 0%, #463A26 100%);
        }
    </style>
</head>
<body class="bg-[#F9F5EF] text-[#594A31]">
    <div id="root"></div>

    <!-- CÓDIGO REACT -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ÍCONES (SVG Inline para não depender de bibliotecas externas) ---
        const Icon = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Check = (props) => <Icon {...props}><polyline points="20 6 9 17 4 12"></polyline></Icon>;
        const ChevronRight = (props) => <Icon {...props}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const Star = (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></Icon>;
        const Phone = (props) => <Icon {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></Icon>;
        const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></Icon>;
        const Calendar = (props) => <Icon {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></Icon>;
        const Instagram = (props) => <Icon {...props}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></Icon>;
        const MenuIcon = (props) => <Icon {...props}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></Icon>;
        const XIcon = (props) => <Icon {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></Icon>;
        const Sparkles = (props) => <Icon {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></Icon>;
        const ArrowRight = (props) => <Icon {...props}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></Icon>;

        // --- DADOS ---
        const proceduresList = [
            {
                id: 1,
                title: "Botox (Toxina Botulínica)",
                shortDesc: "Suavize linhas de expressão e previna rugas.",
                benefits: ["Rejuvenescimento natural", "Previne rugas estáticas", "Rápida recuperação"],
                image: "https://drabeatrizbenevides.com.br/wp-content/uploads/2018/08/botox-ameninza-rugas-e-linhas-de-expressao.jpg"
            },
            {
                id: 2,
                title: "Preenchimento Labial",
                shortDesc: "Volume, contorno e hidratação para seus lábios.",
                benefits: ["Definição do contorno", "Volume na medida certa", "Hidratação profunda"],
                image: "https://aureadermatologia.com.br/home/wp-content/uploads/2022/11/preenchimento_labial_tratamento.jpg"
            },
            {
                id: 3,
                title: "Preenchimento Facial",
                shortDesc: "Harmonia e estruturação para o rosto.",
                benefits: ["Reposição de volume", "Harmonização dos traços", "Aparência descansada"],
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCfAHHdIS65dspyTbRhbvSG-cNkH_nSkGTRA&s"
            },
            {
                id: 4,
                title: "Bioestimulador de Colágeno",
                shortDesc: "Recupere a firmeza e a qualidade da pele.",
                benefits: ["Combate a flacidez", "Melhora a textura", "Efeito lifting gradual"],
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7K070cUy_5-iRb-35dKc3u6Vlp_XJBr9Nug&s"
            },
            {
                id: 5,
                title: "Microagulhamento",
                shortDesc: "Com Exossomos e PDRN para renovação celular.",
                benefits: ["Redução de cicatrizes", "Poros menos visíveis", "Renovação celular intensa"],
                image: "https://d1xe7tfg0uwul9.cloudfront.net/sbd-portal-2024/wp-content/uploads/2021/10/manicure-mais-segura-5-16.jpg"
            }
        ];

        const professionalsList = [
            { id: 1, name: "Dra. Teste", role: "Especialista em Harmonização" },
            { id: 2, name: "Dra. Marina", role: "Biomédica Esteta" },
            { id: 3, name: "Dra. Odara", role: "Dermatofuncional" }
        ];

        const timeSlots = [
            "09:00", "10:00", "11:00", "13:30", "14:30", "15:30", "16:30", "17:30", "18:30"
        ];

        // --- COMPONENTES ---

        // Sub-Componente: Wizard de Agendamento
        function BookingWizard({ procedures, professionals }) {
            const [step, setStep] = useState(1);
            const [bookingData, setBookingData] = useState({
                procedure: null,
                professional: null,
                date: '',
                time: ''
            });

            const handleNext = () => setStep((prev) => Math.min(prev + 1, 4));
            const handleBack = () => setStep((prev) => Math.max(prev - 1, 1));

            const handleSelect = (field, value) => {
                setBookingData(prev => ({ ...prev, [field]: value }));
                if (field !== 'date') {
                    setTimeout(handleNext, 300); 
                }
            };

            const handleWhatsAppRedirect = () => {
                const { procedure, professional, date, time } = bookingData;
                
                if (!procedure || !professional || !date || !time) return;

                const dateObj = new Date(date);
                // Ajuste de fuso horário simples para garantir a data correta
                const userTimezoneOffset = dateObj.getTimezoneOffset() * 60000;
                const correctedDate = new Date(dateObj.getTime() + userTimezoneOffset);
                const formattedDate = correctedDate.toLocaleDateString('pt-BR');

                const message = `Olá! Gostaria de confirmar meu agendamento 😊%0A%0A📌 Procedimento: ${procedure.title}%0A👩‍⚕️ Profissional: ${professional.name}%0A📅 Data: ${formattedDate}%0A⏰ Horário: ${time}`;
                
                const phone = "11993751504"; 
                window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
            };

            const progress = (step / 4) * 100;

            return (
                <section id="agendamento" className="py-24 bg-white">
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-12">
                            <span className="text-[#8A7350] text-sm uppercase tracking-[0.2em] font-semibold mb-2 block">Agendamento Online</span>
                            <h2 className="text-4xl font-light text-[#594A31]">Reserve seu momento</h2>
                        </div>

                        <div className="bg-[#F9F5EF] rounded-2xl shadow-xl overflow-hidden border border-[#594A31]/10">
                            <div className="w-full bg-[#594A31]/10 h-2">
                                <div className="bg-[#594A31] h-2 transition-all duration-500 ease-in-out" style={{ width: `${progress}%` }}></div>
                            </div>

                            <div className="p-8 md:p-12">
                                <div className="flex justify-between items-center mb-8 text-sm font-medium text-[#594A31]/50 border-b border-[#594A31]/10 pb-4">
                                    <span className={step >= 1 ? "text-[#594A31]" : ""}>1. Procedimento</span>
                                    <span className={step >= 2 ? "text-[#594A31] hidden sm:inline" : "hidden sm:inline"}>2. Profissional</span>
                                    <span className={step >= 3 ? "text-[#594A31]" : ""}>3. Data</span>
                                    <span className={step >= 4 ? "text-[#594A31]" : ""}>4. Fim</span>
                                </div>

                                {step === 1 && (
                                    <div className="animate-fade-in">
                                        <h3 className="text-2xl text-[#594A31] mb-6 font-light">Qual procedimento você deseja?</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {procedures.map((proc) => (
                                                <button
                                                    key={proc.id}
                                                    onClick={() => handleSelect('procedure', proc)}
                                                    className={`p-4 rounded-xl text-left border transition-all duration-200 flex items-center justify-between group
                                                        ${bookingData.procedure?.id === proc.id 
                                                        ? 'bg-[#594A31] text-[#F9F5EF] border-[#594A31]' 
                                                        : 'bg-white border-[#594A31]/20 text-[#594A31] hover:border-[#594A31]'}`}
                                                >
                                                    <span className="font-medium">{proc.title}</span>
                                                    {bookingData.procedure?.id === proc.id && <Check size={18} />}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="animate-fade-in">
                                        <h3 className="text-2xl text-[#594A31] mb-6 font-light">Escolha a profissional:</h3>
                                        <div className="space-y-3">
                                            {professionals.map((prof) => (
                                                <button
                                                    key={prof.id}
                                                    onClick={() => handleSelect('professional', prof)}
                                                    className={`w-full p-6 rounded-xl text-left border transition-all duration-200 flex items-center gap-4 group
                                                        ${bookingData.professional?.id === prof.id 
                                                        ? 'bg-[#594A31] text-[#F9F5EF] border-[#594A31]' 
                                                        : 'bg-white border-[#594A31]/20 text-[#594A31] hover:border-[#594A31]'}`}
                                                >
                                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg
                                                        ${bookingData.professional?.id === prof.id ? 'bg-[#F9F5EF] text-[#594A31]' : 'bg-[#594A31]/10'}`}>
                                                        {prof.name.charAt(4)}
                                                    </div>
                                                    <div>
                                                        <p className="font-semibold text-lg">{prof.name}</p>
                                                        <p className={`text-sm ${bookingData.professional?.id === prof.id ? 'text-[#F9F5EF]/80' : 'text-[#594A31]/60'}`}>
                                                            {prof.role}
                                                        </p>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="animate-fade-in">
                                        <h3 className="text-2xl text-[#594A31] mb-6 font-light">Quando você gostaria de vir?</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div>
                                                <label className="block text-sm font-semibold mb-2 uppercase tracking-wide text-[#594A31]">Data</label>
                                                <input 
                                                    type="date" 
                                                    min={new Date().toISOString().split("T")[0]}
                                                    className="w-full p-4 rounded-lg border border-[#594A31]/20 bg-white focus:outline-none focus:ring-2 focus:ring-[#594A31]/50 text-[#594A31]"
                                                    onChange={(e) => setBookingData(prev => ({ ...prev, date: e.target.value }))}
                                                    value={bookingData.date}
                                                />
                                            </div>
                                            
                                            <div>
                                                <label className="block text-sm font-semibold mb-2 uppercase tracking-wide text-[#594A31]">Horário Disponível</label>
                                                <div className="grid grid-cols-3 gap-2">
                                                    {timeSlots.map(time => (
                                                        <button
                                                            key={time}
                                                            onClick={() => handleSelect('time', time)}
                                                            disabled={!bookingData.date}
                                                            className={`py-2 px-1 rounded border text-sm transition-all
                                                                ${!bookingData.date ? 'opacity-50 cursor-not-allowed bg-gray-100 border-gray-200' : ''}
                                                                ${bookingData.time === time 
                                                                    ? 'bg-[#594A31] text-[#F9F5EF] border-[#594A31]' 
                                                                    : 'bg-white hover:bg-[#594A31]/5 text-[#594A31] border-[#594A31]/20'}
                                                            `}
                                                        >
                                                            {time}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {step === 4 && (
                                    <div className="animate-fade-in text-center">
                                        <div className="w-16 h-16 bg-[#594A31]/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Calendar className="w-8 h-8 text-[#594A31]" />
                                        </div>
                                        <h3 className="text-2xl text-[#594A31] mb-2 font-light">Tudo pronto!</h3>
                                        <p className="text-[#594A31]/70 mb-8">Confira os detalhes e finalize no WhatsApp para garantirmos seu horário.</p>

                                        <div className="bg-white p-6 rounded-xl border border-[#594A31]/10 max-w-sm mx-auto mb-8 text-left space-y-3 shadow-inner">
                                            <div className="flex justify-between border-b border-[#594A31]/5 pb-2">
                                                <span className="text-sm text-[#594A31]/60">Procedimento</span>
                                                <span className="font-medium text-[#594A31]">{bookingData.procedure?.title}</span>
                                            </div>
                                            <div className="flex justify-between border-b border-[#594A31]/5 pb-2">
                                                <span className="text-sm text-[#594A31]/60">Profissional</span>
                                                <span className="font-medium text-[#594A31]">{bookingData.professional?.name}</span>
                                            </div>
                                            <div className="flex justify-between border-b border-[#594A31]/5 pb-2">
                                                <span className="text-sm text-[#594A31]/60">Data</span>
                                                <span className="font-medium text-[#594A31]">
                                                    {bookingData.date ? (() => {
                                                        const d = new Date(bookingData.date);
                                                        const offset = d.getTimezoneOffset() * 60000;
                                                        return new Date(d.getTime() + offset).toLocaleDateString('pt-BR');
                                                    })() : ''}
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-sm text-[#594A31]/60">Horário</span>
                                                <span className="font-medium text-[#594A31]">{bookingData.time}</span>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={handleWhatsAppRedirect}
                                            className="gradient-bg text-[#F9F5EF] px-8 py-4 rounded-full text-lg font-semibold uppercase tracking-widest hover:shadow-xl transition-all duration-300 w-full md:w-auto flex items-center justify-center mx-auto gap-2"
                                        >
                                            Continuar no WhatsApp
                                            <ArrowRight className="w-5 h-5" />
                                        </button>
                                    </div>
                                )}

                                <div className="mt-8 flex justify-between">
                                    {step > 1 && (
                                        <button 
                                            onClick={handleBack}
                                            className="px-6 py-2 rounded-lg text-sm font-medium text-[#594A31] hover:bg-[#594A31]/5 transition-colors"
                                        >
                                            Voltar
                                        </button>
                                    )}
                                    {step < 4 && step !== 1 && step !== 2 && (
                                        <button 
                                            onClick={handleNext}
                                            disabled={step === 3 && (!bookingData.date || !bookingData.time)}
                                            className={`ml-auto px-6 py-2 rounded-lg text-sm font-medium transition-all
                                                ${step === 3 && (!bookingData.date || !bookingData.time)
                                                    ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                                                    : 'bg-[#594A31] text-[#F9F5EF] hover:bg-[#463A26]'
                                                }`}
                                        >
                                            Continuar
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // Componente Principal App
        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('home');

            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['home', 'procedimentos', 'agendamento', 'sobre', 'contato'];
                    const scrollPosition = window.scrollY + 100;

                    for (const section of sections) {
                        const element = document.getElementById(section);
                        if (element && element.offsetTop <= scrollPosition && (element.offsetTop + element.offsetHeight) > scrollPosition) {
                            setActiveSection(section);
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                setIsMenuOpen(false);
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="font-sans text-[#594A31] min-h-screen selection:bg-[#594A31] selection:text-[#F9F5EF]">
                    
                    {/* Navigation */}
                    <nav className="fixed w-full z-50 glass-effect border-b border-[#594A31]/10 transition-all duration-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <div className="flex-shrink-0 cursor-pointer" onClick={() => scrollToSection('home')}>
                                    <div className="flex flex-col items-center justify-center leading-tight">
                                        <span className="text-3xl font-light tracking-[0.2em] text-[#594A31]">ZAIRA</span>
                                        <span className="text-[0.6rem] tracking-[0.3em] uppercase text-[#8A7350]">Estética Avançada</span>
                                    </div>
                                </div>

                                <div className="hidden md:flex space-x-8 items-center">
                                    {['Home', 'Procedimentos', 'Sobre', 'Contato'].map((item) => (
                                        <button
                                            key={item}
                                            onClick={() => scrollToSection(item.toLowerCase())}
                                            className={`text-sm uppercase tracking-wider transition-colors duration-300 hover:text-[#8A7350] ${
                                                activeSection === item.toLowerCase() ? 'font-semibold border-b-2 border-[#594A31]' : 'font-medium'
                                            }`}
                                        >
                                            {item}
                                        </button>
                                    ))}
                                    <button
                                        onClick={() => scrollToSection('agendamento')}
                                        className="bg-[#594A31] text-[#F9F5EF] px-6 py-2 rounded-full text-sm font-medium uppercase tracking-wide hover:bg-[#463A26] transition-all duration-300 transform hover:scale-105 shadow-lg"
                                    >
                                        Agendar Agora
                                    </button>
                                </div>

                                <div className="md:hidden flex items-center">
                                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-[#594A31] focus:outline-none">
                                        {isMenuOpen ? <XIcon size={28} /> : <MenuIcon size={28} />}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {isMenuOpen && (
                            <div className="md:hidden glass-effect border-t border-[#594A31]/10 absolute w-full">
                                <div className="px-4 pt-2 pb-6 space-y-2 text-center">
                                    {['Home', 'Procedimentos', 'Agendamento', 'Sobre', 'Contato'].map((item) => (
                                        <button
                                            key={item}
                                            onClick={() => scrollToSection(item.toLowerCase())}
                                            className="block w-full px-3 py-3 text-base font-medium text-[#594A31] hover:bg-[#594A31]/5 rounded-md uppercase tracking-wider"
                                        >
                                            {item}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </nav>

                    {/* Hero Section */}
                    <section id="home" className="relative h-screen flex items-center justify-center pt-20 overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1607567840134-1c5c7aa206a4?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=90" 
                                alt="Zaira Estética Background" 
                                className="w-full h-full object-cover opacity-90"
                            />
                            <div className="absolute inset-0 bg-gradient-to-r from-[#F9F5EF]/90 via-[#F9F5EF]/60 to-transparent"></div>
                        </div>
                        
                        <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-start w-full">
                            <div className="max-w-xl animate-fade-in-up">
                                <div className="flex items-center space-x-2 mb-4">
                                    <span className="h-[1px] w-12 bg-[#594A31]"></span>
                                    <span className="text-[#594A31] text-sm uppercase tracking-[0.2em] font-medium">Estética Premium</span>
                                </div>
                                <h1 className="text-5xl md:text-6xl lg:text-7xl font-light text-[#594A31] leading-tight mb-6">
                                    Realce sua <br />
                                    <span className="font-semibold italic">beleza</span> com <br />
                                    naturalidade.
                                </h1>
                                <p className="text-lg text-[#594A31]/80 mb-8 leading-relaxed max-w-md">
